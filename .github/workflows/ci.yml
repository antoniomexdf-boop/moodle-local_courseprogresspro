name: Moodle Plugin CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  ci:
    name: ci (${{ matrix.moodle-branch }}, PHP ${{ matrix.php }}, ${{ matrix.database }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        moodle-branch:
          - MOODLE_404_STABLE
          - MOODLE_405_STABLE
        php:
          - '8.1'
          - '8.2'
        database:
          - pgsql

    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      COMPOSER_PROCESS_TIMEOUT: 0
      COMPOSER_NO_INTERACTION: 1
      COMPOSER_NO_AUDIT: 1

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: >
            curl, dom, gd, intl, json, mbstring, openssl,
            pdo, pgsql, simplexml, soap, xml, xmlreader, zip
          coverage: none
          tools: composer:v2
          ini-values: max_input_vars=5000

      - name: Cache Composer downloads
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache/files
          key: composer-${{ runner.os }}-${{ matrix.php }}-${{ matrix.moodle-branch }}
          restore-keys: |
            composer-${{ runner.os }}-${{ matrix.php }}-
            composer-${{ runner.os }}-

      - name: Install moodle-plugin-ci outside repository
        run: |
          rm -rf /tmp/moodle-plugin-ci
          composer create-project --no-dev --prefer-dist moodlehq/moodle-plugin-ci /tmp/moodle-plugin-c

