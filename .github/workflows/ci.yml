name: Moodle Plugin CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  ci:
    name: ci (${{ matrix.moodle-branch }}, PHP ${{ matrix.php }}, ${{ matrix.database }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        moodle-branch:
          - MOODLE_404_STABLE
          - MOODLE_405_STABLE
        php:
          - '8.1'
          - '8.2'
        database:
          - pgsql

    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: >
            curl, dom, gd, intl, json, mbstring, openssl,
            pdo, pgsql, simplexml, soap, xml, xmlreader, zip
          coverage: none
          tools: composer:v2
          ini-values: max_input_vars=5000

      - name: Cache Composer downloads
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache/files
          key: composer-${{ runner.os }}-${{ matrix.php }}-${{ matrix.moodle-branch }}
          restore-keys: |
            composer-${{ runner.os }}-${{ matrix.php }}-
            composer-${{ runner.os }}-

      - name: Install moodle-plugin-ci outside repository
        run: |
          composer create-project --no-dev --prefer-dist moodlehq/moodle-plugin-ci /tmp/moodle-plugin-ci 4.5.10
          echo "/tmp/moodle-plugin-ci/bin" >> $GITHUB_PATH
          echo "/tmp/moodle-plugin-ci/vendor/bin" >> $GITHUB_PATH

      - name: Wait for PostgreSQL
        run: |
          for i in {1..20}; do
            pg_isready -h 127.0.0.1 -U postgres -d postgres && break
            sleep 2
          done

      - name: Install Moodle
        run: |
          moodle-plugin-ci install \
            --plugin . \
            --db-type=pgsql \
            --db-host=127.0.0.1 \
            --db-user=postgres \
            --db-pass=postgres \
            --db-name=moodle \
            --no-init
        env:
          MOODLE_BRANCH: ${{ matrix.moodle-branch }}

      - name: PHP lint
        run: moodle-plugin-ci phplint .

      - name: Moodle code checker
        run: moodle-plugin-ci phpcs --max-warnings=0 -s

      - name: Moodle PHPDoc checker
        run: moodle-plugin-ci phpdoc --max-warnings=0

      - name: Validate plugin
        run: moodle-plugin-ci validate

      - name: Check upgrade savepoints
        run: moodle-plugin-ci savepoints

      - name: Mustache lint
        run: moodle-plugin-ci mustache

      - name: PHPUnit tests
        run: moodle-plugin-ci phpunit --fail-on-warning

