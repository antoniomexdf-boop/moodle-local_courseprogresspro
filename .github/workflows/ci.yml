name: Moodle Plugin CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: moodle-plugin-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: >
      test (PHP ${{ matrix.php }}, ${{ matrix.moodle-branch }}, ${{ matrix.database }})
    runs-on: ubuntu-22.04

    strategy:
      fail-fast: false
      matrix:
        php: ['7.4', '8.0', '8.1']
        moodle-branch: ['MOODLE_401_STABLE']
        database: ['pgsql', 'mariadb']

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: moodle
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d moodle"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      mariadb:
        image: mariadb:10.11
        env:
          MYSQL_DATABASE: moodle
          MYSQL_USER: moodle
          MYSQL_PASSWORD: moodle
          MYSQL_ROOT_PASSWORD: root
          MYSQL_CHARACTER_SET_SERVER: utf8mb4
          MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -hmariadb -proot"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      CI_DIR: ${{ runner.temp }}/moodle-plugin-ci
      PLUGIN_DIR: ${{ github.workspace }}/plugin

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          path: plugin

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          ini-values: max_input_vars=5000
          coverage: none
          tools: composer

      - name: Cache Composer downloads
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache/files
          key: composer-${{ runner.os }}-${{ matrix.php }}-${{ hashFiles('plugin/**/composer.lock') }}
          restore-keys: |
            composer-${{ runner.os }}-${{ matrix.php }}-
            composer-${{ runner.os }}-

      - name: Initialise moodle-plugin-ci
        run: |
          composer create-project -n --no-dev --prefer-dist moodlehq/moodle-plugin-ci "$CI_DIR" ^4
          echo "$CI_DIR/bin" >> "$GITHUB_PATH"
          echo "$CI_DIR/vendor/bin" >> "$GITHUB_PATH"
          sudo locale-gen en_AU.UTF-8
          echo "NVM_DIR=$HOME/.nvm" >> "$GITHUB_ENV"

      - name: Wait for PostgreSQL
        if: ${{ matrix.database == 'pgsql' }}
        run: |
          for i in {1..30}; do
            pg_isready -h 127.0.0.1 -p 5432 -U postgres -d moodle && exit 0
            sleep 2
          done
          echo "PostgreSQL did not become ready in time."
          exit 1

      - name: Wait for MariaDB
        if: ${{ matrix.database == 'mariadb' }}
        run: |
          for i in {1..30}; do
            mysqladmin ping -h127.0.0.1 -uroot -proot --silent && exit 0
            sleep 2
          done
          echo "MariaDB did not become ready in time."
          exit 1

      - name: Install Moodle and plugin
        run: moodle-plugin-ci install --plugin "$PLUGIN_DIR" --db-host=127.0.0.1
        env:
          MOODLE_BRANCH: ${{ matrix.moodle-branch }}
          DB: ${{ matrix.database }}
          DB_NAME: moodle
          DB_USER: ${{ matrix.database == 'pgsql' && 'postgres' || 'moodle' }}
          DB_PASS: ${{ matrix.database == 'pgsql' && 'postgres' || 'moodle' }}

      - name: PHP Lint
        run: moodle-plugin-ci phplint

      - name: PHP Mess Detector
        run: moodle-plugin-ci phpmd

      - name: Moodle Code Checker
        run: moodle-plugin-ci phpcs --max-warnings 0

      - name: Moodle PHPDoc Checker
        run: moodle-plugin-ci phpdoc --max-warnings 0

      - name: Validate plugin
        run: moodle-plugin-ci validate

      - name: Check upgrade savepoints
        run: moodle-plugin-ci savepoints

      - name: Mustache Lint
        run: moodle-plugin-ci mustache

      - name: Grunt
        run: moodle-plugin-ci grunt --max-lint-warnings 0

      - name: PHPUnit tests
        run: moodle-plugin-ci phpunit --fail-on-warning

      - name: Behat features
        id: behat
        run: moodle-plugin-ci behat --profile chrome --scss-deprecations

      - name: Upload Behat Faildump
        if: ${{ failure() && steps.behat.outcome == 'failure' }}
        uses: actions/upload-artifact@v4
        with:
          name: behat-faildump-${{ matrix.php }}-${{ matrix.moodle-branch }}-${{ matrix.database }}
          path: ${{ github.workspace }}/moodledata/behat_dump
          retention-days: 7
          if-no-files-found: ignore

      - name: Mark cancelled jobs as failed
        if: ${{ cancelled() }}
        run: exit 1
