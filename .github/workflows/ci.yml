name: Moodle Plugin CI

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

concurrency:
  group: moodle-plugin-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test PHP ${{ matrix.php }} / ${{ matrix.database }}
    runs-on: ubuntu-22.04

    strategy:
      fail-fast: false
      matrix:
        php: ['7.4','8.0','8.1']
        database: ['pgsql','mariadb']

    services:

      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: moodle
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d moodle"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      mariadb:
        image: mariadb:10.11
        env:
          MYSQL_DATABASE: moodle
          MYSQL_USER: moodle
          MYSQL_PASSWORD: moodle
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h127.0.0.1 -proot"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      CI_DIR: /tmp/moodle-plugin-ci
      PLUGIN_DIR: ${{ github.workspace }}/plugin

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          path: plugin

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer
          coverage: none

      - name: Install moodle-plugin-ci
        run: |
          composer create-project --no-dev --prefer-dist moodlehq/moodle-plugin-ci "$CI_DIR" ^4
          echo "$CI_DIR/bin" >> $GITHUB_PATH
          echo "$CI_DIR/vendor/bin" >> $GITHUB_PATH

      - name: Wait for PostgreSQL
        if: matrix.database == 'pgsql'
        run: |
          for i in {1..30}; do
            pg_isready -h 127.0.0.1 -p 5432 -U postgres -d moodle && exit 0
            sleep 2
          done
          exit 1

      - name: Wait for MariaDB
        if: matrix.database == 'mariadb'
        run: |
          for i in {1..30}; do
            mysqladmin ping -h127.0.0.1 -uroot -proot --silent && exit 0
            sleep 2
          done
          exit 1

      - name: Install Moodle
        run: |
          moodle-plugin-ci install \
          --plugin "$PLUGIN_DIR" \
          --db-host=127.0.0.1
        env:
          MOODLE_BRANCH: MOODLE_401_STABLE
          DB: ${{ matrix.database }}
          DB_NAME: moodle
          DB_USER: ${{ matrix.database == 'pgsql' && 'postgres' || 'moodle' }}
          DB_PASS: ${{ matrix.database == 'pgsql' && 'postgres' || 'moodle' }}

      - name: PHP Lint
        run: moodle-plugin-ci phplint

      - name: PHP Mess Detector
        run: moodle-plugin-ci phpmd

      - name: Moodle Code Checker
        run: moodle-plugin-ci phpcs

      - name: Validate plugin
        run: moodle-plugin-ci validate

      - name: Check savepoints
        run: moodle-plugin-ci savepoints

      - name: Mustache templates
        run: moodle-plugin-ci mustache

      - name: Grunt
        run: moodle-plugin-ci grunt

      - name: PHPUnit
        run: moodle-plugin-ci phpunit

      - name: Behat tests
        run: moodle-plugin-ci behat
